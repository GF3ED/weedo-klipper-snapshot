# =========================================================
# WEEDO X40 V2 IDEX - CORE CONFIG
# Rev. 2026-04-15 v3 — config pulito + macro separate
# =========================================================

[include mainsail1.cfg]
[include macro.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_45001E000651303532383235-if00

[force_move]
enable_force_move: True

[printer]
kinematics: cartesian
max_velocity: 180
max_accel: 2500
max_z_velocity: 85
max_z_accel: 30
square_corner_velocity: 3.0

[exclude_object]
[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 80
gcode:
    TURN_OFF_HEATERS
    M84

[bed_mesh]
speed: 80
horizontal_move_z: 8
mesh_min: 50,10
mesh_max: 250,290
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

# =========================================================
# MOTORI ASSI + DRIVER
# =========================================================
[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 33.992
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -11
position_min: -11
position_max: 303
homing_speed: 20
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC4
diag_pin: ^PG6
run_current: 0.50
sense_resistor: 0.110
interpolate: True
stealthchop_threshold: 999999
driver_SGTHRS: 90

[stepper_x]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 33.992
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_min: 0
position_max: 300
homing_speed: 15
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PD11
diag_pin: ^PG9
run_current: 0.50
sense_resistor: 0.110
interpolate: True
stealthchop_threshold: 999999
driver_SGTHRS: 55

[dual_carriage]
axis: x
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 33.992
endstop_pin: tmc2209_dual_carriage:virtual_endstop
position_endstop: 300
position_min: 0
position_max: 300
homing_speed: 15
homing_retract_dist: 0
homing_positive_dir: true
safe_distance: 40

[tmc2209 dual_carriage]
uart_pin: PC7
diag_pin: ^PG11
run_current: 0.50
sense_resistor: 0.110
interpolate: True
stealthchop_threshold: 999999
driver_SGTHRS: 55

[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 400
homing_speed: 5
second_homing_speed: 2
homing_retract_dist: 2

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.45
sense_resistor: 0.110
stealthchop_threshold: 0
interpolate: True

# =========================================================
# ESTRUSORI T0 / T1
# =========================================================
[extruder]
step_pin: PF9             # Driver4 STEP (E0)
dir_pin: PF10             # Driver4 DIR  (E0)
enable_pin: !PG2          # Driver4 EN   (E0)
microsteps: 16
rotation_distance: 33.720
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA2            # H0
sensor_pin: PF4            # J45 / TH0
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114.0
min_temp: 0
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.0

[tmc2209 extruder]
uart_pin: PF2             # Driver4 UART (E0)
run_current: 0.55
sense_resistor: 0.110
stealthchop_threshold: 0
interpolate: True

[extruder1]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 33.720
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA3            # H1
sensor_pin: PF5            # J46 / TH1
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114.0
min_temp: 0
max_temp: 300
min_extrude_temp: 170
pressure_advance: 0.0

[tmc2209 extruder1]
uart_pin: PE4
run_current: 0.55
sense_resistor: 0.110
stealthchop_threshold: 0
interpolate: True

[heater_bed]
heater_pin: PA1
sensor_pin: PF3            # J44 / TB
sensor_type: ATC Semitec 104GT-2
control: watermark
min_temp: 0
max_temp: 110

# =========================================================
# PROBE + SENSORI + FAN
# =========================================================
[probe]
pin: ^!PB7
deactivate_on_each_sample: True
x_offset: -40
y_offset: 0
z_offset: 0
speed: 5.0
samples: 2
samples_tolerance: 0.05
samples_tolerance_retries: 6
sample_retract_dist: 6.0
lift_speed: 15
activate_gcode:
    PROBE_DOWN
    G4 P500
deactivate_gcode:
    PROBE_UP

[output_pin probe_enable]
pin: PB6
value: 0

[filament_switch_sensor filament_runout_1]
switch_pin: ^PG12
pause_on_runout: False
runout_gcode:
    RESPOND MSG="Runout T0 rilevato"

[filament_switch_sensor filament_runout_2]
switch_pin: ^PG13
pause_on_runout: False
runout_gcode:
    RESPOND MSG="Runout T1 rilevato"

[fan]
pin: PA8

[fan_generic hotend_fan_t0]
pin: PE5

[fan_generic board_fan]
pin: PD13
