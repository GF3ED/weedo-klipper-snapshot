# =========================================================
# WEEDO X40 V2 IDEX - MACRO CUSTOM
# Rev. 2026-04-15 v3 — split in macro.cfg + T1/extruder1
# =========================================================

# =========================
# TOOLCHANGE IDEX (T0/T1)
# =========================
[gcode_macro _TOOL_SELECT]
description: Selezione carrello/tool con parcheggio sicuro
gcode:
    {% set tool = params.TOOL|int %}
    {% set park_x = params.PARK_X|default(0)|float %}
    {% set t1_extruder = printer['gcode_macro _T1_CONFIG'].extruder_name %}
    {% if tool == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SAVE_GCODE_STATE NAME=toolchange_state
        G90
        G1 X{park_x} F6000
        RESTORE_GCODE_STATE NAME=toolchange_state
        RESPOND MSG="Tool T0 attivo (carrello sinistro)"
    {% elif tool == 1 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        {% if t1_extruder in printer %}
            ACTIVATE_EXTRUDER EXTRUDER={t1_extruder}
        {% else %}
            RESPOND TYPE=error MSG="Estrusore T1 '{t1_extruder}' non definito"
            ACTIVATE_EXTRUDER EXTRUDER=extruder
        {% endif %}
        SAVE_GCODE_STATE NAME=toolchange_state
        G90
        G1 X{park_x} F6000
        RESTORE_GCODE_STATE NAME=toolchange_state
        RESPOND MSG="Tool T1 attivo (carrello destro)"
    {% else %}
        RESPOND TYPE=error MSG="TOOL non valido: usare TOOL=0 o TOOL=1"
    {% endif %}

[gcode_macro _T1_CONFIG]
variable_extruder_name: "extruder1"
gcode:

[gcode_macro T0]
description: Seleziona T0 (carrello sinistro)
gcode:
    _TOOL_SELECT TOOL=0 PARK_X=0

[gcode_macro T1]
description: Seleziona T1 (carrello destro)
gcode:
    _TOOL_SELECT TOOL=1 PARK_X=300

[gcode_macro TEST_T1]
description: Test rapido selezione T1 senza estrusione
gcode:
    RESPOND MSG="TEST_T1: start"
    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    T1
    G90
    G1 X280 F6000
    G1 X300 F6000
    T0
    RESPOND MSG="TEST_T1: done"

[gcode_macro DEBUG_IDEX_CFG]
description: Verifica rapida coerenza toolchange IDEX
gcode:
    RESPOND MSG="DEBUG: T1 extruder={printer['gcode_macro _T1_CONFIG'].extruder_name}"
    {% if printer['gcode_macro _T1_CONFIG'].extruder_name in printer %}
        RESPOND MSG="DEBUG: extruder configurato e presente"
    {% else %}
        RESPOND TYPE=error MSG="DEBUG: extruder T1 non presente in config"
    {% endif %}

# =========================
# Z_MASTER_HOME
# Riallineamento meccanico Z (motore libero → battuta alta)
# poi homing Z normale via probe.
# USARE solo se la macchina era spenta con Z basso.
# =========================
[gcode_macro Z_MASTER_HOME]
description: Riallineamento meccanico Z + homing Z normale
gcode:
    RESPOND MSG="Z_MASTER_HOME: start"

    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}

    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    {% if 'z' in printer.toolhead.homed_axes %}
        G91
        G1 Z5 F600
        G90
    {% endif %}

    M18 Z
    G4 P300
    FORCE_MOVE STEPPER=stepper_z DISTANCE=400 VELOCITY=20 ACCEL=0
    G4 P500

    SET_KINEMATIC_POSITION Z=400 SET_HOMED=XY CLEAR_HOMED=Z

    G90
    G1 X190 Y150 F6000
    G28 Z
    G1 Z10 F1200

    RESPOND MSG="Z_MASTER_HOME: done"

# =========================
# Z_HOME_SAFE
# =========================
[gcode_macro Z_HOME_SAFE]
description: Homing Z normale con probe sopra il piatto
gcode:
    RESPOND MSG="Z_HOME_SAFE: start"

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    G90
    G1 X190 Y150 F6000
    G28 Z
    G1 Z10 F1200

    RESPOND MSG="Z_HOME_SAFE: done"

# =========================
# MESH_Z
# =========================
[gcode_macro MESH_Z]
description: Homing Z + bed mesh
gcode:
    RESPOND MSG="MESH_Z: start"

    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}

    Z_HOME_SAFE
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE

    RESPOND MSG="MESH_Z: done"

[gcode_macro PROBE_DOWN]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_UP]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

# =========================================================
# HOMING MACROS - minimali e deterministiche
# =========================================================
[gcode_macro _HOME_Y]
gcode:
    {% set run_cur = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set home_cur = 0.60 %}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={home_cur}
    G4 P2000
    G28 Y0
    G4 P500
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={run_cur}

[gcode_macro _HOME_X]
description: Homing X IDEX nativo (X1+X2) con corrente dedicata
gcode:
    {% set run_cur_x1 = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set run_cur_x2 = printer.configfile.settings['tmc2209 dual_carriage'].run_current|float %}
    {% set home_cur = 0.72 %}
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={home_cur}
    SET_TMC_CURRENT STEPPER=dual_carriage CURRENT={home_cur}
    G4 P2000
    G28 X0
    G4 P500
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={run_cur_x1}
    SET_TMC_CURRENT STEPPER=dual_carriage CURRENT={run_cur_x2}
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

[gcode_macro HOME_X1]
description: Homing X con focus toolhead sinistro (IDEX)
gcode:
    _HOME_X
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    RESPOND MSG="HOME_X1: done"

[gcode_macro HOME_X2]
description: Homing X con focus toolhead destro (IDEX)
gcode:
    _HOME_X
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    {% set t1_extruder = printer['gcode_macro _T1_CONFIG'].extruder_name %}
    {% if t1_extruder in printer %}
        ACTIVATE_EXTRUDER EXTRUDER={t1_extruder}
    {% else %}
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% endif %}
    RESPOND MSG="HOME_X2: done"

[homing_override]
axes: xyz
set_position_z: 5
gcode:
    G91
    G1 Z5 F1200
    G90

    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}

    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    {% if home_all or 'Z' in params %}
        {% if 'x' not in printer.toolhead.homed_axes %}
            _HOME_X
        {% endif %}
        {% if 'y' not in printer.toolhead.homed_axes %}
            _HOME_Y
        {% endif %}

        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G90
        G1 Z10 F600
        G1 X190 Y150 F3000
        G28 Z
        G1 Z10 F1200
    {% endif %}
